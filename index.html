<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Ayudante Cocina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const RECIPES = [
            {
                id: 1,
                title: "Pasta Fresca",
                category: "Pastas",
                time: "15 min reposo",
                difficulty: "Baja",
                ingredients: ["100 gr. de harina", "1 huevo", "10 gr. de aceite", "1 gr. de sal"],
                steps: [
                    "En un bol ponemos todos los ingredientes y amasamos hasta formar una masa uniforme y homogénea. Tiene que quedar blandita, no seca.",
                    "Reposamos mínimo 15 minutos envuelta en film a temperatura ambiente.",
                    "Ponemos un poco de harina en mesa y estiramos con rodillo o máquina hasta dejarla de unos 3 mm de grosor.",
                    "Si es pasta simple: dejar secar y cortar. Si es rellena: no dejar secar, rellenar y tapar con otra lámina.",
                    "Cocer en agua hirviendo durante 2-3 minutos."
                ],
                davidTip: "El reposo es sagrado para que el gluten se relaje. Si la masa está muy seca, humedece tus manos en lugar de echar agua directa.",
                tips: "Se puede añadir tinta de calamar, concentrado de tomate o puré de remolacha para dar color/sabor."
            },
            {
                id: 2,
                title: "Focaccia",
                category: "Masas",
                time: "20 min amasado",
                difficulty: "Media",
                ingredients: [
                    "250 gr. de harina de fuerza", "5 gr de sal", "10 gr de azúcar", 
                    "150 ml de agua", "4 gr. de levadura liofilizada", "20 gr de aceite de oliva",
                    "Decoración: Tomates cherry, Orégano o tomillo fresco, Escama de sal, Aceite de oliva, Cebolla en juliana"
                ],
                steps: [
                    "En un bol ponemos la harina, la sal, el azúcar, el agua y el aceite. Mezclamos hasta conseguir un engrudo y añadimos la levadura.",
                    "Amasamos durante 20 minutos hasta conseguir una masa homogénea, elástica y muy blandita.",
                    "Fermentamos tapada con paño húmedo hasta que doble su volumen.",
                    "Desgasificar y estirar con las manos sobre bandeja con papel sulfurizado.",
                    "Añadir los toppings y dejar fermentar 10 minutos más.",
                    "Horneamos 20 minutos a 180-200 grados."
                ],
                davidTip: "Realizar 3 ciclos de pliegues cada 30 min. Poner aceite bajo el film para que no se pegue.",
                tips: "Cada harina absorbe distinto; es posible que necesites ajustar el agua durante el amasado."
            },
            {
                id: 3,
                title: "Pan de Hamburguesa",
                category: "Masas",
                time: "2h aprox",
                difficulty: "Media",
                ingredients: [
                    "250 gr. de harina de fuerza", "150 ml de agua", "6 gr. de levadura liofilizada", 
                    "5 gr. de sal", "10 gr. de azúcar", "1 cda de leche en polvo", 
                    "20 gr. de mantequilla o manteca de cerdo", "1 huevo batido (pintar)", "Semillas de amapola o sésamo"
                ],
                steps: [
                    "Mezclar en bol: harina, azúcar, sal y leche en polvo.",
                    "Añadir la mantequilla/manteca fundida, el agua y la levadura.",
                    "Amasar hasta tener una masa elástica, blanda y homogénea.",
                    "Fermentar hasta doblar el volumen.",
                    "Dividir la masa (2 grandes u 8 pequeños), desgasificar y bolear.",
                    "Fermentar unos 10 minutos (Ajuste David).",
                    "Pintar con huevo y añadir semillas.",
                    "Hornear a 180ºC (18-22 min grandes / 15-17 min pequeños)."
                ],
                davidTip: "Bolear dando mucha tensión. No estirar la masa en forma alargada, queremos bolas perfectas.",
                tips: "Con esta cantidad salen 2 unidades grandes u 8 pequeñas."
            },
            {
                id: 4,
                title: "Paella Mixta",
                category: "Arroces",
                time: "17 min cocción",
                difficulty: "Alta",
                ingredients: [
                    "320 gr. de arroz", "1 pechuga de pollo", "3 chipirones", "100 gr. langostinos", "300 gr. mejillones",
                    "2 ajos", "1 pimiento verde", "½ pimiento rojo", "2 tomates", "60 ml aceite", "1L caldo", "Sal, colorante/azafrán, pimentón"
                ],
                steps: [
                    "Dorar la pechuga troceada en aceite y retirar.",
                    "Dorar ajo, añadir pimientos. Cuando doren, añadir langostinos pelados y chipirones.",
                    "Añadir de nuevo el pollo. Cuando se 'agarre', añadir el tomate troceado.",
                    "Añadir colorante, azafrán y pimentón.",
                    "Nacarar el arroz. Añadir caldo caliente y sal.",
                    "Cocer 5 minutos a fuego vivo y 12 minutos a fuego suave.",
                    "NO VOLVER A REMOVER LA PAELLA CON NINGÚN UTENSILIO."
                ],
                davidTip: "Respetar los 5 minutos de reposo tapada al final.",
                tips: "Es vital conocer el arroz para saber el caldo exacto que absorbe."
            },
            {
                id: 5,
                title: "Risotto de Setas",
                category: "Arroces",
                time: "25 min",
                difficulty: "Media",
                ingredients: [
                    "400g arroz carnaroli/arborio", "200g setas/champiñones", "1 cebolla", "2 ajos", 
                    "800ml-1L caldo", "100g mantequilla", "100g Parmesano rallado", "Sal y pimienta"
                ],
                steps: [
                    "Pochar ajo y cebolla en mantequilla fundida. Salpimentar.",
                    "Añadir las setas laminadas y cocinarlas 5 minutos.",
                    "Incorporar el arroz y sellarlo.",
                    "Añadir el caldo caliente poco a poco sin parar de remover.",
                    "Mantecar fuera del fuego con mantequilla y queso."
                ],
                davidTip: "Mantecar con la grasa (mantequilla) muy fría para crear la emulsión.",
                tips: "Originalmente se utiliza el parmesano."
            },
            {
                id: 6,
                title: "Pisto con Huevo Escalfado",
                category: "Verduras",
                time: "60 min",
                difficulty: "Media",
                ingredients: [
                    "1 kg cebollas", "1 kg pimiento verde", "1 kg pimiento rojo", "1 kg calabacín", 
                    "3 kg tomate pelado", "500 ml aceite", "20g sal", "50g azúcar", "Huevo, film, aceite"
                ],
                steps: [
                    "Cortar verduras en brunoisse.",
                    "Pochar cebolla, añadir pimientos hasta que estén tiernos.",
                    "Añadir calabacín y cocinar.",
                    "Añadir tomate, sal y azúcar. Reducir hasta que el tomate baje a la mitad.",
                    "Escalfar huevo en film (aceite+sal) a 80ºC durante 5-6 min.",
                    "Refrescar en agua fría y retirar film."
                ],
                davidTip: "Concentrar bien el tomate es la clave del pisto.",
                tips: "Se puede sustituir el calabacín por berenjena."
            },
            {
                id: 7,
                title: "Croquetas de Jamón",
                category: "Entrantes",
                time: "4h reposo",
                difficulty: "Media",
                ingredients: [
                    "100 gr. harina", "100 gr. mantequilla", "700 ml leche", "150 gr. jamón picado",
                    "3 huevos", "Sal y nuez moscada", "Pan rallado y harina", "1L aceite girasol"
                ],
                steps: [
                    "Hacer ROUX: fundir mantequilla y cocinar harina 3 min.",
                    "Añadir leche poco a poco con varilla hasta tener masa suave.",
                    "Añadir jamón, sal y nuez moscada.",
                    "Bolear, pasar por harina, huevo y pan rallado.",
                    "Freír en aceite abundante y caliente."
                ],
                davidTip: "Usar Corn Flakes machacados para el rebozado final. Cocinar bien el roux para que no sepa a harina.",
                tips: "La bechamel debe enfriar completamente antes de bolear."
            },
            {
                id: 8,
                title: "Pollo Pepitoria",
                category: "Carnes",
                time: "45 min",
                difficulty: "Media",
                ingredients: [
                    "½ pollo (cuarto trasero)", "1 cebolla", "2 ajos", "150 ml vino blanco",
                    "½ L caldo ave", "1 huevo cocido", "Azafrán, 1 rebanada pan, 50g almendras", "Aceite, sal, pimienta"
                ],
                steps: [
                    "Picar cebolla y ajos en brunoisse. Cocer huevo 9-11 min.",
                    "Marcar pollo salpimentado y retirar.",
                    "Pochar cebolla/ajo, reincorporar pollo y desglasar con vino.",
                    "Añadir majado (pan tostado, almendras, yema cocida y azafrán).",
                    "Cubrir con caldo y cocer 20-25 min.",
                    "Decorar con la clara picada."
                ],
                davidTip: "El majado debe estar bien triturado para ligar la salsa.",
                tips: "Se puede usar brandy en vez de vino blanco."
            }
        ];

        const CATEGORIES = ["Todas", "Masas", "Arroces", "Carnes", "Verduras", "Entrantes", "Pescados", "Pastas"];

        function App() {
            const [search, setSearch] = useState("");
            const [activeCategory, setActiveCategory] = useState("Todas");
            const [selectedRecipe, setSelectedRecipe] = useState(null);

            // Refrescar iconos de Lucide cada vez que el DOM cambia
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [selectedRecipe, activeCategory, search]);

            const filteredRecipes = useMemo(() => {
                return RECIPES.filter(recipe => {
                    const matchSearch = recipe.title.toLowerCase().includes(search.toLowerCase()) || 
                                      recipe.ingredients.some(ing => ing.toLowerCase().includes(search.toLowerCase()));
                    const matchCat = activeCategory === "Todas" || recipe.category === activeCategory;
                    return matchSearch && matchCat;
                });
            }, [search, activeCategory]);

            return (
                <div className="min-h-screen pb-20">
                    <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 p-6">
                        <div className="flex items-center gap-4 mb-6">
                            <div className="bg-slate-900 p-2.5 rounded-2xl shadow-lg">
                                <i data-lucide="chef-hat" className="text-orange-500 w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">
                                    Recetario<span className="text-orange-600">Aranda</span>
                                </h1>
                                <p className="text-[9px] font-bold text-slate-400 tracking-widest uppercase mt-1">Creado por: David H </p>
                            </div>
                        </div>
                        <div className="relative mb-4">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input 
                                type="text" 
                                placeholder="Buscar receta o ingrediente..." 
                                className="w-full bg-slate-100 border-none rounded-2xl py-3.5 pl-12 pr-4 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none transition-all"
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat} 
                                    onClick={() => setActiveCategory(cat)}
                                    className={`px-5 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all whitespace-nowrap ${activeCategory === cat ? "bg-slate-900 text-white" : "bg-white text-slate-400 border border-slate-100"}`}
                                >
                                    {cat.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-6 grid grid-cols-1 gap-6">
                        {filteredRecipes.map(recipe => (
                            <div 
                                key={recipe.id} 
                                onClick={() => setSelectedRecipe(recipe)} 
                                className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex justify-between items-center active:scale-95 transition-transform cursor-pointer"
                            >
                                <div>
                                    <span className="text-[10px] font-black text-orange-600 bg-orange-50 px-3 py-1 rounded-full uppercase tracking-widest">{recipe.category}</span>
                                    <h3 className="text-xl font-black text-slate-800 mt-2 tracking-tight">{recipe.title}</h3>
                                    <div className="flex items-center gap-3 mt-2 text-slate-400 text-[10px] font-bold">
                                        <span className="flex items-center gap-1"><i data-lucide="clock" className="w-3 h-3 text-orange-400"></i>{recipe.time}</span>
                                        <span className="flex items-center gap-1"><i data-lucide="flame" className="w-3 h-3 text-orange-400"></i>{recipe.difficulty}</span>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-3 rounded-2xl">
                                    <i data-lucide="chevron-right" className="text-orange-500"></i>
                                </div>
                            </div>
                        ))}
                    </main>

                    {selectedRecipe && (
                        <div className="fixed inset-0 z-50 bg-white overflow-y-auto p-6 animate-slide-up">
                            <button 
                                onClick={() => setSelectedRecipe(null)} 
                                className="fixed top-6 right-6 z-50 bg-slate-900 text-white p-3 rounded-2xl shadow-xl active:scale-90 transition-transform"
                            >
                                <i data-lucide="x"></i>
                            </button>
                            
                            <div className="mt-12 max-w-2xl mx-auto">
                                <span className="text-xs font-black text-orange-600 uppercase tracking-widest">{selectedRecipe.category}</span>
                                <h2 className="text-4xl font-black text-slate-900 mt-2 mb-8 tracking-tighter leading-none">{selectedRecipe.title}</h2>
                                
                                {selectedRecipe.davidTip && (
                                    <div className="bg-orange-600 p-6 rounded-[2rem] text-white mb-10 shadow-xl shadow-orange-100">
                                        <div className="flex items-center gap-2 mb-2">
                                            <i data-lucide="zap" className="w-5 h-5 fill-white"></i>
                                            <span className="text-[10px] font-black uppercase tracking-widest">Nota de David</span>
                                        </div>
                                        <p className="text-lg font-bold italic">"{selectedRecipe.davidTip}"</p>
                                    </div>
                                )}

                                <section className="mb-10">
                                    <h4 className="text-xl font-black mb-4 flex items-center gap-2 italic tracking-tighter border-l-4 border-orange-500 pl-3">Ingredientes</h4>
                                    <div className="grid gap-2">
                                        {selectedRecipe.ingredients.map((ing, i) => (
                                            <div key={i} className="bg-slate-50 p-4 rounded-2xl text-sm font-bold text-slate-700 flex items-center gap-3">
                                                <div className="w-2 h-2 rounded-full bg-orange-500"></div>{ing}
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="mb-10">
                                    <h4 className="text-xl font-black mb-6 flex items-center gap-2 italic tracking-tighter border-l-4 border-orange-500 pl-3">Elaboración</h4>
                                    <div className="space-y-6">
                                        {selectedRecipe.steps.map((step, i) => (
                                            <div key={i} className="flex gap-4">
                                                <span className="flex-shrink-0 w-8 h-8 bg-slate-900 text-white rounded-xl flex items-center justify-center font-black text-sm">{i+1}</span>
                                                <p className="text-slate-600 font-medium leading-relaxed">{step}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="bg-slate-900 p-8 rounded-[2.5rem] text-white mb-20">
                                    <div className="flex items-center gap-2 mb-3 text-orange-500">
                                        <i data-lucide="lightbulb" className="w-6 h-6 fill-orange-500"></i>
                                        <span className="font-black uppercase tracking-widest text-xs">Sugerencia</span>
                                    </div>
                                    <p className="text-slate-300 italic font-medium">"{selectedRecipe.tips}"</p>
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
